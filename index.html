<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SongID" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Song Detector</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: #ffffff;
      --text-muted: #9ca3af;
      --text-dim: #6b7280;
      
      --accent: #8b5cf6;
      --accent-light: #a78bfa;
      --accent-glow: rgba(139, 92, 246, 0.5);

      --glass-bg: rgba(20, 20, 28, 0.45);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-hover: rgba(255, 255, 255, 0.15);
      
      --radius: 20px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 20px calc(32px + var(--safe-bottom));
      color: var(--text);
      background-color: #030305;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Animated Mesh Background ── */
    body::before, body::after {
      content: '';
      position: fixed;
      width: 80vw;
      height: 80vw;
      max-width: 800px;
      max-height: 800px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      pointer-events: none;
      animation: float 20s ease-in-out infinite alternate;
    }
    
    body::before {
      background: radial-gradient(circle, rgba(139,92,246,0.3) 0%, transparent 70%);
      top: -20%;
      left: -10%;
    }
    
    body::after {
      background: radial-gradient(circle, rgba(236,72,153,0.2) 0%, transparent 70%);
      bottom: -20%;
      right: -10%;
      animation-delay: -10s;
    }

    /* Noise Texture */
    .noise-overlay {
      position: fixed;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      mix-blend-mode: overlay;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(5%, 10%) scale(1.1); }
      100% { transform: translate(10%, -5%) scale(0.9); }
    }

    .app { 
      width: 100%; 
      max-width: 440px; 
      position: relative; 
      z-index: 1; 
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 24px; }
    
    .header-glyph-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.01));
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      backdrop-filter: blur(20px);
      margin-bottom: 20px;
      position: relative;
    }
    
    .header-glyph-container::before {
      content: '';
      inset: -1px;
      position: absolute;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, var(--accent), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.5;
    }

    .header-glyph {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      color: var(--text);
      line-height: 1;
    }

    .header h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 32px;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 400;
    }

    /* ── Glass Container ── */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
      transition: border-color 0.3s ease;
    }

    /* ── API Key ── */
    .field label {
      display: flex;
      justify-content: space-between;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    
    .field label a { 
      color: var(--accent-light); 
      text-decoration: none; 
      transition: color 0.2s;
    }
    
    .field label a:hover { color: #fff; }
    
    .field input {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .field input:focus { 
      border-color: var(--accent); 
      background: rgba(0,0,0,0.4);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }
    
    .field input::placeholder { color: var(--text-dim); }

    /* ── Drop Zone ── */
    #drop-zone {
      position: relative;
      border: 1px dashed var(--glass-border-hover);
      border-radius: calc(var(--radius) - 4px);
      padding: 50px 20px;
      text-align: center;
      cursor: pointer;
      background: rgba(255,255,255,0.02);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }
    
    #drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, var(--accent-glow) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(139, 92, 246, 0.05);
      transform: translateY(-2px);
    }
    
    #drop-zone:hover::before, #drop-zone.drag-over::before {
      opacity: 0.1;
    }
    
    #drop-zone:active {
      transform: translateY(1px);
    }

    .drop-icon { 
      font-size: 40px; 
      display: inline-block; 
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    #drop-zone:hover .drop-icon {
      transform: scale(1.1) translateY(-4px);
    }

    .drop-title { 
      font-family: 'Outfit', sans-serif; 
      font-size: 18px; 
      font-weight: 600;
      color: var(--text); 
      margin-bottom: 8px; 
      position: relative;
    }
    
    .drop-sub { 
      font-size: 12px; 
      color: var(--text-muted); 
      position: relative;
    }
    
    .format-pills {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 12px;
      position: relative;
    }
    
    .format-pill {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--text-dim);
    }

    /* ── Shared Banner ── */
    #shared-banner {
      display: none;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent-light);
      text-align: center;
      animation: fadeInDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ── Loading ── */
    #loading {
      display: none;
      padding: 40px 20px;
      text-align: center;
    }
    
    .loading-visualizer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 40px;
      margin-bottom: 24px;
    }
    
    .visualizer-bar {
      width: 4px;
      background: linear-gradient(180deg, var(--accent-light), var(--accent));
      border-radius: 4px;
      animation: equalize 1.2s cubic-bezier(0.16, 1, 0.3, 1) infinite;
      box-shadow: 0 0 12px rgba(139, 92, 246, 0.4);
    }
    
    .visualizer-bar:nth-child(1) { height: 16px; animation-delay: -0.8s; }
    .visualizer-bar:nth-child(2) { height: 32px; animation-delay: -0.6s; }
    .visualizer-bar:nth-child(3) { height: 40px; animation-delay: -0.4s; }
    .visualizer-bar:nth-child(4) { height: 24px; animation-delay: -0.2s; }
    .visualizer-bar:nth-child(5) { height: 16px; animation-delay: 0s; }
    
    @keyframes equalize {
      0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
      50% { transform: scaleY(1); opacity: 1; }
    }
    
    #loading-label { 
      color: var(--text); 
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    #loading-file { 
      color: var(--text-dim);   
      font-size: 12px; 
    }

    /* ── Result ── */
    #result {
      display: none;
      animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      overflow: visible; /* to allow glowing effect to bleed */
      margin-bottom: 8px;
    }

    .album-art-container {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 24px auto;
    }
    
    /* The glowing shadow behind album art */
    .album-art-glow {
      position: absolute;
      inset: -10px;
      background-size: cover;
      background-position: center;
      filter: blur(24px) saturate(150%);
      opacity: 0.6;
      border-radius: 20px;
      z-index: 1;
      transform: translateY(10px);
    }

    .result-art img {
      position: relative;
      width: 140px;
      height: 140px;
      border-radius: 16px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 2;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .result-art .art-placeholder {
      position: relative;
      width: 140px;
      height: 140px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(0,0,0,0.4));
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      z-index: 2;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .match-label {
      display: inline-flex;
      align-items: center;
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.3);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-light);
      margin-bottom: 20px;
      margin-left: auto;
      margin-right: auto;
    }

    .song-details {
      text-align: center;
      margin-bottom: 24px;
    }

    .result-title {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.2;
    }
    
    .result-artist { 
      font-size: 16px;
      font-weight: 500;
      color: var(--text-muted); 
      margin-bottom: 8px; 
    }
    
    .result-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .result-meta span {
      font-size: 13px;
      color: var(--text-dim);
    }
    
    .meta-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--glass-border-hover);
    }
    
    .result-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }
    
    .result-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .link-spotify { 
      background: rgba(29, 185, 84, 0.15); 
      color: #1ed760; 
      border: 1px solid rgba(29, 185, 84, 0.25); 
    }
    .link-spotify:hover {
      background: rgba(29, 185, 84, 0.25);
      border-color: rgba(29, 185, 84, 0.5);
      transform: translateY(-2px);
    }
    
    .link-apple { 
      background: rgba(252, 60, 68, 0.15); 
      color: #fc3c44; 
      border: 1px solid rgba(252, 60, 68, 0.25); 
    }
    .link-apple:hover {
      background: rgba(252, 60, 68, 0.25);
      border-color: rgba(252, 60, 68, 0.5);
      transform: translateY(-2px);
    }

    /* ── Error ── */
    #error {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      padding: 16px;
      font-size: 14px;
      font-weight: 500;
      color: #fca5a5;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 16px;
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ── Try Again Button ── */
    #btn-reset {
      display: none;
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      -webkit-tap-highlight-color: transparent;
    }
    
    #btn-reset:hover { 
      background: rgba(255,255,255,0.1);
      border-color: var(--glass-border-hover); 
      transform: translateY(-2px);
    }
    
    #btn-reset:active {
      transform: translateY(0);
    }

    /* ── Install Banner ── */
    #install-banner {
      display: none;
      position: fixed;
      bottom: calc(20px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 440px;
      background: rgba(20, 20, 30, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border-hover);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 100;
      box-shadow: 0 16px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    
    #install-banner.hidden { display: none !important; }
    
    .install-icon {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    
    .install-text { 
      flex: 1; 
      font-size: 13px; 
      color: var(--text-muted); 
      line-height: 1.4; 
    }
    .install-text strong { 
      color: var(--text); 
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600; 
      display: block;
      margin-bottom: 2px;
    }
    #btn-install {
      background: var(--text);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    #btn-install:active { opacity: 0.8; }
    
    #btn-install-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      margin-top: 24px;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ── Animations ── */
    @keyframes slideUp { 
      from { opacity: 0; transform: translateY(20px); } 
      to { opacity: 1; transform: none; } 
    }
    @keyframes fadeInDown { 
      from { opacity: 0; transform: translateY(-10px); } 
      to { opacity: 1; transform: none; } 
    }
    @keyframes scaleIn { 
      from { opacity: 0; transform: scale(0.96); } 
      to { opacity: 1; transform: none; } 
    }
  </style>
</head>
<body>
<div class="noise-overlay"></div>

<div class="app">
  <div class="header">
    <div class="header-glyph-container">
      <span class="header-glyph">𝄞</span>
    </div>
    <h1>Song ID</h1>
    <p>Upload a video to discover the track.</p>
  </div>

  <div class="glass-card field">
    <label>AudD API Key <a href="https://audd.io" target="_blank">Get free key ›</a></label>
    <input type="password" id="api-key" placeholder="Paste your token here..." autocomplete="off" />
  </div>

  <div id="shared-banner"></div>

  <div class="glass-card" id="main-container">
    <div id="drop-zone">
      <span class="drop-icon">🎬</span>
      <div class="drop-title">Drop your video here</div>
      <div class="drop-sub">Tap to browse your files</div>
      <div class="format-pills">
        <span class="format-pill">MP4</span>
        <span class="format-pill">MOV</span>
        <span class="format-pill">WEBM</span>
      </div>
    </div>

    <div id="loading">
      <div class="loading-visualizer">
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
      </div>
      <div id="loading-label">Extracting audio...</div>
      <div id="loading-file"></div>
    </div>

    <div id="result">
      <div style="text-align: center;">
         <div class="match-label">Match Found!</div>
      </div>
      
      <div class="album-art-container">
        <div class="album-art-glow" id="result-art-glow"></div>
        <div class="result-art" id="result-art"></div>
      </div>
      
      <div class="song-details">
        <div class="result-title" id="result-title"></div>
        <div class="result-artist" id="result-artist"></div>
        <div class="result-meta">
          <span id="result-album"></span>
          <div class="meta-dot" id="meta-dot"></div>
          <span id="result-year"></span>
        </div>
      </div>
      
      <div class="result-links" id="result-links"></div>
    </div>
    
    <div id="error"></div>
  </div>

  <button id="btn-reset">Scan another video</button>

  <div class="footer">Audio processed entirely on your device.</div>
</div>

<!-- Install Prompt -->
<div id="install-banner" class="hidden">
  <div class="install-icon">📲</div>
  <div class="install-text">
    <strong>Install Application</strong>
    Share videos directly to extract audio
  </div>
  <button id="btn-install">Install</button>
  <button id="btn-install-close">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
  </button>
</div>

<input type="file" id="file-input" accept="video/*" style="display:none" />

<script>
// ══════════════════════════════════════════════
//  Service Worker Registration
// ══════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    console.log('[App] SW registered', reg.scope);
  }).catch(err => console.warn('[App] SW failed', err));

  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'SHARED_VIDEO_READY') {
      loadSharedVideo();
    }
  });
}

// ══════════════════════════════════════════════
//  DOM refs
// ══════════════════════════════════════════════
const $dropZone     = document.getElementById('drop-zone');
const $fileInput    = document.getElementById('file-input');
const $apiKey       = document.getElementById('api-key');
const $loading      = document.getElementById('loading');
const $loadingLabel = document.getElementById('loading-label');
const $loadingFile  = document.getElementById('loading-file');
const $result       = document.getElementById('result');
const $error        = document.getElementById('error');
const $btnReset     = document.getElementById('btn-reset');
const $sharedBanner = document.getElementById('shared-banner');
const $installBanner = document.getElementById('install-banner');

// ══════════════════════════════════════════════
//  Persist API key
// ══════════════════════════════════════════════
$apiKey.value = localStorage.getItem('audd_key') || '';
$apiKey.addEventListener('input', () => localStorage.setItem('audd_key', $apiKey.value.trim()));

// ══════════════════════════════════════════════
//  Share Target — check on load
// ══════════════════════════════════════════════
window.addEventListener('load', () => {
  if (location.search.includes('shared=1')) {
    history.replaceState({}, '', location.pathname);
    loadSharedVideo();
  }
});

async function loadSharedVideo() {
  try {
    const cache = await caches.open('song-detector-share');
    const response = await cache.match('/pending-video');
    if (!response) return;

    const blob = await response.blob();
    const fileName = decodeURIComponent(response.headers.get('X-File-Name') || 'shared-video.mp4');
    await cache.delete('/pending-video');

    $sharedBanner.style.display = 'block';
    $sharedBanner.textContent = `📲 Received via Share: ${fileName}`;

    const file = new File([blob], fileName, { type: blob.type });
    processFile(file);
  } catch (err) {
    console.error('[App] loadSharedVideo error', err);
  }
}

// ══════════════════════════════════════════════
//  File handling
// ══════════════════════════════════════════════
$dropZone.addEventListener('click', () => $fileInput.click());
$fileInput.addEventListener('change', e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
});

$dropZone.addEventListener('dragover',  e => { e.preventDefault(); $dropZone.classList.add('drag-over'); });
$dropZone.addEventListener('dragleave', () => $dropZone.classList.remove('drag-over'));
$dropZone.addEventListener('drop', e => {
  e.preventDefault();
  $dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file?.type.startsWith('video/')) processFile(file);
  else showError('Please drop a video file (MP4, MOV, WebM).');
});

$btnReset.addEventListener('click', reset);

// ══════════════════════════════════════════════
//  Core processing
// ══════════════════════════════════════════════
async function processFile(file) {
  reset(false);
  $sharedBanner.style.display = 'none';
  showLoading('Extracting audio signature...', file.name);

  try {
    const audioBlob = await extractAudio(file);
    showLoading('Identifying track via API...', file.name);

    const apiKey = $apiKey.value.trim();
    const data = await recognizeSong(audioBlob, apiKey);

    if (data.status === 'success' && data.result) {
      showResult(data.result);
    } else if (data.status === 'success') {
      showError("Couldn't identify the song. Make sure the music is clearly audible in the video.");
    } else {
      const msg = data.error?.error_message || 'Recognition failed.';
      const hint = msg.toLowerCase().includes('token') || msg.toLowerCase().includes('key')
        ? ' Check if your API key is correctly entered.' : '';
      showError(msg + hint);
    }
  } catch (err) {
    console.error(err);
    if (err.message?.includes('decode')) {
      showError('Could not decode this video format. Try converting to MP4 or MOV.');
    } else {
      showError('Audio extraction failed: ' + err.message);
    }
  }
}

// ── Audio extraction (Web Audio API → mono WAV) ──
async function extractAudio(file) {
  const arrayBuffer = await file.arrayBuffer();
  const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
  const buffer = await ctx.decodeAudioData(arrayBuffer);
  ctx.close();
  return bufferToWav(buffer, 25);
}

function bufferToWav(buffer, maxSeconds) {
  const sampleRate = buffer.sampleRate;
  const maxSamples = sampleRate * maxSeconds;
  const raw = buffer.getChannelData(0);
  const samples = raw.slice(0, Math.min(maxSamples, raw.length));
  const dataLen = samples.length * 2;
  const ab = new ArrayBuffer(44 + dataLen);
  const v = new DataView(ab);
  const str = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };

  str(0, 'RIFF'); v.setUint32(4, 36 + dataLen, true);
  str(8, 'WAVE'); str(12, 'fmt '); v.setUint32(16, 16, true);
  v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sampleRate, true); v.setUint32(28, sampleRate * 2, true);
  v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  str(36, 'data'); v.setUint32(40, dataLen, true);
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7fff, true);
  }
  return new Blob([ab], { type: 'audio/wav' });
}

// ── AudD API call ──
async function recognizeSong(audioBlob, apiKey) {
  const form = new FormData();
  form.append('file', audioBlob, 'audio.wav');
  form.append('return', 'apple_music,spotify');
  if (apiKey) form.append('api_token', apiKey);

  const res = await fetch('https://api.audd.io/', { method: 'POST', body: form });
  return res.json();
}

// ══════════════════════════════════════════════
//  UI helpers
// ══════════════════════════════════════════════
function showLoading(label, fileName) {
  $dropZone.style.display = 'none';
  $result.style.display   = 'none';
  $error.style.display    = 'none';
  $btnReset.style.display = 'none';
  $loading.style.display  = 'block';
  $loadingLabel.textContent = label;
  $loadingFile.textContent  = fileName || '';
}

function showResult(r) {
  $loading.style.display = 'none';
  $result.style.display  = 'block';
  $btnReset.style.display = 'block';

  document.getElementById('result-title').textContent  = r.title  || 'Unknown Track';
  document.getElementById('result-artist').textContent = r.artist || 'Unknown Artist';
  
  const album = r.album || '';
  const year = r.release_date ? r.release_date.slice(0, 4) : '';
  
  document.getElementById('result-album').textContent = album;
  document.getElementById('result-year').textContent = year;
  
  // Hide meta dot if not both
  document.getElementById('meta-dot').style.display = (album && year) ? 'block' : 'none';

  // Art and Glow
  const artEl = document.getElementById('result-art');
  const glowEl = document.getElementById('result-art-glow');
  const artUrl = r.apple_music?.artwork?.url?.replace('{w}x{h}', '400x400');
  
  if (artUrl) {
    artEl.innerHTML = `<img src="${artUrl}" alt="Album art" />`;
    glowEl.style.backgroundImage = `url('${artUrl}')`;
    glowEl.style.display = 'block';
  } else {
    artEl.innerHTML = `<span class="art-placeholder">🎵</span>`;
    glowEl.style.display = 'none';
  }

  // Links
  const linksEl = document.getElementById('result-links');
  linksEl.innerHTML = '';
  if (r.spotify?.external_urls?.spotify) {
    const a = document.createElement('a');
    a.href = r.spotify.external_urls.spotify;
    a.target = '_blank'; a.rel = 'noreferrer';
    a.className = 'link-spotify'; 
    a.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.84.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.239.54-.959.72-1.56.3z"/></svg> Open in Spotify';
    linksEl.appendChild(a);
  }
  if (r.apple_music?.url) {
    const a = document.createElement('a');
    a.href = r.apple_music.url;
    a.target = '_blank'; a.rel = 'noreferrer';
    a.className = 'link-apple'; 
    a.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.029.083c-.596.012-1.987.161-3.693 1.139C6.671 2.164 5.485 3.518 5.485 5.093c0 1.259 1.065 2.108 1.933 2.108.683 0 1.916-.482 3.655-1.14 1.645-.632 2.825-1.636 2.825-3.056 0-1.85-1.306-2.883-1.869-2.922zM12.032 6c-2.31 0-4.045 1.14-5.32 2.658C5.452 10.155 4 13.064 4 16.59c0 3.86 2.062 7.025 4.318 7.378.966.155 1.62-.258 2.868-.258 1.272 0 1.765.258 2.89.258 2.04 0 3.842-2.33 4.908-4.526 1.066-2.196 1.31-4.707.973-5.234-.407-.635-1.921-.498-2.618-1.428-.868-1.157-.962-2.585-.436-3.882-1.04-1.66-2.903-2.896-4.87-2.896z"/></svg> Open in Apple Music';
    linksEl.appendChild(a);
  }
}

function showError(msg) {
  $loading.style.display  = 'none';
  $dropZone.style.display = 'block';
  $error.style.display    = 'block';
  $error.textContent      = msg;
  $btnReset.style.display = 'block';
}

function reset(showDrop = true) {
  $loading.style.display  = 'none';
  $result.style.display   = 'none';
  $error.style.display    = 'none';
  $btnReset.style.display = 'none';
  $sharedBanner.style.display = 'none';
  $sharedBanner.textContent   = '';
  if (showDrop) $dropZone.style.display = 'block';
  
  // Clear the glowing background
  const glowEl = document.getElementById('result-art-glow');
  if(glowEl) {
    glowEl.style.backgroundImage = 'none';
    glowEl.style.display = 'none';
  }
  
  $fileInput.value = '';
}

// ══════════════════════════════════════════════
//  Install Prompt (A2HS)
// ══════════════════════════════════════════════
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Only show if not already installed
  if (!window.matchMedia('(display-mode: standalone)').matches) {
    $installBanner.classList.remove('hidden');
  }
});

document.getElementById('btn-install').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  $installBanner.classList.add('hidden');
});

document.getElementById('btn-install-close').addEventListener('click', () => {
  $installBanner.classList.add('hidden');
});
</script>
</body>
</html>
